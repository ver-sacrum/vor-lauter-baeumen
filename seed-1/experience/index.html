<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>seed-1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #080808;
      overflow: hidden;
    }

    canvas {
      display: block;
      position: fixed;
      inset: 0;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    #mute-btn {
      position: absolute;
      bottom: 32px;
      right: 32px;
      pointer-events: all;
      cursor: pointer;
      background: none;
      border: none;
      padding: 8px;
      opacity: 0.28;
      transition: opacity 0.4s;
    }

    #mute-btn:hover { opacity: 0.6; }

    #mute-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #c8c8c0;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #seed-label {
      position: absolute;
      bottom: 36px;
      left: 32px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #242422;
      text-transform: lowercase;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <button id="mute-btn" aria-label="Toggle sound">
    <svg id="icon-sound" viewBox="0 0 24 24">
      <path d="M11 5L6 9H2v6h4l5 4V5z"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    </svg>
    <svg id="icon-mute" viewBox="0 0 24 24" style="display:none">
      <path d="M11 5L6 9H2v6h4l5 4V5z"/>
      <line x1="23" y1="9" x2="17" y2="15"/>
      <line x1="17" y1="9" x2="23" y2="15"/>
    </svg>
  </button>
  <span id="seed-label">seed-1</span>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIGURATION — change these per pendant
// ─────────────────────────────────────────────────────────────────────────────

const SEED_STRING = 'seed-1';

const SOUND_FILES = [
  '../../sounds/a_breathing_forest_1.mp3',
  '../../sounds/a_breathing_forest_2.mp3',
  '../../sounds/a_breathing_forest_3.mp3',
  '../../sounds/Caterpillars_dreaming_of_butterflies_during_the_winter_2.mp3',
  '../../sounds/leaves_falling_quietly_1.mp3',
  '../../sounds/rocks_crumbling_and_freezing_1.mp3',
  '../../sounds/trees_communicating_1.mp3',
];

// ─────────────────────────────────────────────────────────────────────────────
// SEED HASH
// Converts the seed string into a stable integer.
// Same string always produces the same visual character.
// ─────────────────────────────────────────────────────────────────────────────

function hashString(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  }
  return Math.abs(h);
}

const SEED_INT = hashString(SEED_STRING);

// Seeded pseudo-random generator — gives stable values from the seed
// without affecting Math.random() used elsewhere
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

const rng = seededRandom(SEED_INT);
function sr(min, max) { return min + rng() * (max - min); }

// ─────────────────────────────────────────────────────────────────────────────
// TIME-BASED PHASE
// Animation runs on a 20-minute cycle — each visit catches it mid-flow
// ─────────────────────────────────────────────────────────────────────────────

const CYCLE_MS   = 20 * 60 * 1000;
const TIME_PHASE = (Date.now() % CYCLE_MS) / CYCLE_MS; // 0.0 → 1.0

// ─────────────────────────────────────────────────────────────────────────────
// PARAMETERS — derived from seed, stable per pendant
// ─────────────────────────────────────────────────────────────────────────────

const PARAMS = {
  particleCount:  Math.floor(sr(60, 140)),   // how many particles
  orbitSpread:    sr(80, 200),               // how wide the cluster spreads
  driftSpeed:     sr(0.00008, 0.00018),      // how fast particles drift (very slow)
  breatheAmp:     sr(6, 18),                 // how much the cluster breathes in/out
  breathePeriod:  sr(0.0004, 0.0009),        // speed of breathing
  connectionDist: sr(55, 100),               // max distance for faint connection lines
  glowRadius:     sr(0.55, 0.85),            // size of central backlight
  glowBrightness: sr(22, 34),               // max brightness of central glow (0-255)
};

// ─────────────────────────────────────────────────────────────────────────────
// CANVAS SETUP
// ─────────────────────────────────────────────────────────────────────────────

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, cx, cy;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}

resize();
window.addEventListener('resize', () => { resize(); drawBacklight(); });

// ─────────────────────────────────────────────────────────────────────────────
// BACKLIGHT
// A very soft radial glow at the centre — the particles float against this.
// Painted once onto the canvas at startup; particles layer on top.
// ─────────────────────────────────────────────────────────────────────────────

function drawBacklight() {
  const r    = Math.max(W, H) * PARAMS.glowRadius;
  const maxB = PARAMS.glowBrightness;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  grad.addColorStop(0,   `rgba(${maxB}, ${maxB}, ${maxB + 2}, 0.22)`);
  grad.addColorStop(0.4, `rgba(${Math.floor(maxB * 0.5)}, ${Math.floor(maxB * 0.5)}, ${Math.floor(maxB * 0.5)}, 0.10)`);
  grad.addColorStop(1,   'rgba(8, 8, 8, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// Fill background and paint backlight once at start
ctx.fillStyle = '#080808';
ctx.fillRect(0, 0, W, H);
drawBacklight();

// ─────────────────────────────────────────────────────────────────────────────
// PARTICLES
// Each particle orbits a slowly drifting point near the centre.
// No interaction — purely autonomous drift.
// ─────────────────────────────────────────────────────────────────────────────

class Particle {
  constructor() {
    // Stable starting angle and orbit radius — seeded so same per pendant
    this.orbitAngle  = sr(0, Math.PI * 2);
    this.orbitRadius = sr(10, PARAMS.orbitSpread);
    this.orbitSpeed  = (sr(0, 1) < 0.5 ? 1 : -1) * sr(PARAMS.driftSpeed * 0.5, PARAMS.driftSpeed * 1.5);

    // Breathing: each particle breathes at a slightly different phase
    this.breathePhase = sr(0, Math.PI * 2);

    // Visual properties
    this.r     = sr(0.5, 1.8);
    this.alpha = sr(0.08, 0.45);

    // Current position (will be set each frame)
    this.x = cx;
    this.y = cy;
  }

  update(time) {
    // Slowly advance orbit angle
    this.orbitAngle += this.orbitSpeed;

    // Breathe: orbit radius pulses gently over time
    const breathe = Math.sin(time * PARAMS.breathePeriod + this.breathePhase) * PARAMS.breatheAmp;
    const r = this.orbitRadius + breathe;

    this.x = cx + Math.cos(this.orbitAngle) * r;
    this.y = cy + Math.sin(this.orbitAngle) * r;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180, 180, 164, ${this.alpha})`;
    ctx.fill();
  }
}

// Initialise particles — orbit angles are offset by time phase
// so each visit starts mid-cycle
const particles = Array.from({ length: PARAMS.particleCount }, () => new Particle());

// Pre-advance particles to the current time phase position
const PHASE_FRAMES = TIME_PHASE * 200000;
for (let i = 0; i < PHASE_FRAMES; i += 100) {
  particles.forEach(p => p.update(i));
}

// ─────────────────────────────────────────────────────────────────────────────
// CONNECTION LINES
// Very faint lines between nearby particles — appear and dissolve
// as particles drift closer and further apart
// ─────────────────────────────────────────────────────────────────────────────

function drawConnections() {
  const dist = PARAMS.connectionDist;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const a = particles[i];
      const b = particles[j];
      const d = Math.hypot(a.x - b.x, a.y - b.y);
      if (d < dist) {
        const alpha = (1 - d / dist) * 0.06;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = `rgba(168, 168, 144, ${alpha})`;
        ctx.lineWidth = 0.4;
        ctx.stroke();
      }
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// ANIMATION LOOP
// ─────────────────────────────────────────────────────────────────────────────

let time = 0;

function loop() {
  // Very slow fade to background — creates long dissolving trails
  ctx.fillStyle = 'rgba(8, 8, 8, 0.04)';
  ctx.fillRect(0, 0, W, H);

  // Occasionally repaint the backlight so it doesn't fade out completely
  if (time % 180 === 0) drawBacklight();

  drawConnections();
  particles.forEach(p => { p.update(time); p.draw(); });

  time++;
  requestAnimationFrame(loop);
}

loop();

// ─────────────────────────────────────────────────────────────────────────────
// AUDIO
// ─────────────────────────────────────────────────────────────────────────────

let audioCtx  = null;
let gainNode  = null;
let isMuted   = false;
let hasPlayed = false;

async function startAudio() {
  if (hasPlayed || SOUND_FILES.length === 0) return;
  hasPlayed = true;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = audioCtx.createGain();
    gainNode.connect(audioCtx.destination);
    gainNode.gain.value = 1;

    const url     = SOUND_FILES[Math.floor(Math.random() * SOUND_FILES.length)];
    const res     = await fetch(url);
    const buf     = await res.arrayBuffer();
    const decoded = await audioCtx.decodeAudioData(buf);
    const source  = audioCtx.createBufferSource();
    source.buffer = decoded;
    source.loop   = true;
    source.connect(gainNode);
    source.start();
  } catch(e) {
    console.info('Audio not available:', e.message);
  }
}

startAudio();
document.addEventListener('click',    () => startAudio(), { once: true });
document.addEventListener('touchend', () => startAudio(), { once: true });

// Mute toggle
const muteBtn   = document.getElementById('mute-btn');
const iconSound = document.getElementById('icon-sound');
const iconMute  = document.getElementById('icon-mute');

muteBtn.addEventListener('click', () => {
  isMuted = !isMuted;
  if (gainNode) {
    gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(isMuted ? 0 : 1, audioCtx.currentTime + 0.3);
  }
  iconSound.style.display = isMuted ? 'none'  : 'block';
  iconMute.style.display  = isMuted ? 'block' : 'none';
});
</script>

</body>
</html>
