<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>seed-1</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #080808;
      overflow: hidden;
    }

    /* p5 canvas sits behind everything */
    canvas {
      display: block;
      position: fixed;
      inset: 0;
    }

    /* UI layer floats above canvas */
    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* Mute toggle — bottom right, pointer-events re-enabled */
    #mute-btn {
      position: absolute;
      bottom: 32px;
      right: 32px;
      pointer-events: all;
      cursor: pointer;
      background: none;
      border: none;
      padding: 8px;
      opacity: 0.35;
      transition: opacity 0.4s;
    }

    #mute-btn:hover { opacity: 0.7; }

    #mute-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #c8c8c0;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Seed name — bottom left */
    #seed-label {
      position: absolute;
      bottom: 36px;
      left: 32px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #2a2a28;
      text-transform: lowercase;
    }
  </style>
</head>
<body>

<div id="ui">
  <button id="mute-btn" aria-label="Toggle sound" title="Toggle sound">
    <!-- Speaker icon, swapped via JS when muted -->
    <svg id="icon-sound" viewBox="0 0 24 24">
      <path d="M11 5L6 9H2v6h4l5 4V5z"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    </svg>
    <svg id="icon-mute" viewBox="0 0 24 24" style="display:none">
      <path d="M11 5L6 9H2v6h4l5 4V5z"/>
      <line x1="23" y1="9" x2="17" y2="15"/>
      <line x1="17" y1="9" x2="23" y2="15"/>
    </svg>
  </button>
  <span id="seed-label">seed-1</span>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIGURATION
// Change SEED_STRING per pendant. Everything visual is derived from this value.
// Change SOUND_FILES to point to your hosted audio files.
// ─────────────────────────────────────────────────────────────────────────────

const SEED_STRING = 'seed-1';

const SOUND_FILES = [
  // Add your sound file URLs here, e.g.:
  // 'https://yourdomain.com/sounds/forest-a.mp3',
  // 'sounds/forest-b.mp3',
];

// ─────────────────────────────────────────────────────────────────────────────
// SEED HASH
// Converts the seed string into a stable integer used to initialise
// p5's random number generator. Same string → same visual character, always.
// ─────────────────────────────────────────────────────────────────────────────

function hashString(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  }
  return Math.abs(h);
}

const SEED_INT = hashString(SEED_STRING);

// ─────────────────────────────────────────────────────────────────────────────
// TIME-BASED PHASE
// The animation runs on a continuous 6-hour cycle.
// Each visit catches it at a different point in that cycle.
// This value (0.0 → 1.0) is passed into the noise field as a z-offset,
// so the fluid is always mid-flow, never restarting from the same state.
// ─────────────────────────────────────────────────────────────────────────────

const CYCLE_MS    = 20 * 60 * 1000; // 20 minutes in milliseconds
const TIME_PHASE  = (Date.now() % CYCLE_MS) / CYCLE_MS; // 0.0 → 1.0

// ─────────────────────────────────────────────────────────────────────────────
// P5 SKETCH
// ─────────────────────────────────────────────────────────────────────────────

new p5(function(p) {

  // ── Parameters derived from seed ──────────────────────────────────────────
  // We temporarily set p5's random seed to extract stable parameters,
  // then reset it so the animation itself runs freely from the time phase.

  let params = {};

  function deriveParams() {
    p.randomSeed(SEED_INT);

    params = {
      // How many fluid layers to draw (2–4)
      layers:      Math.floor(p.random(2, 5)),

      // Base noise scale: controls size of fluid shapes
      // Smaller = larger, more billowing forms
      // Larger  = tighter, more intricate forms
      noiseScale:  p.random(0.0008, 0.0022),

      // How fast the noise field evolves over time
      // This is the speed of the 6-hour cycle applied per frame
      timeScale:   p.random(0.00006, 0.00014),

      // Ink darkness: how dark the shapes are relative to background
      // 0 = invisible, 1 = maximum contrast
      inkStrength: p.random(0.45, 0.72),

      // Slight warm/cool bias per pendant (very subtle)
      // 0 = pure grey, positive = very faint warm, negative = very faint cool
      colorBias:   p.random(-0.015, 0.015),
    };

    p.randomSeed(); // release seed lock
  }

  // ── Offscreen graphics buffers ────────────────────────────────────────────
  // We render each fluid layer into a graphics buffer,
  // then composite them onto the main canvas with low opacity.
  // This creates soft, overlapping forms rather than a single flat layer.

  let t = 0; // time accumulator, starts at the cycle phase

  // ── Setup ─────────────────────────────────────────────────────────────────

  p.setup = function() {
    let cnv = p.createCanvas(p.windowWidth, p.windowHeight);
    cnv.style('display', 'block');
    cnv.style('position', 'fixed');
    cnv.style('top', '0');
    cnv.style('left', '0');

    p.pixelDensity(1); // keep it lightweight on high-DPI screens
    p.noiseDetail(4, 0.5); // 4 octaves of noise, moderate falloff

    deriveParams();

    // Initialise time from the cycle phase so each visit starts mid-flow
    t = TIME_PHASE * 1000;

    p.background(38); // testing brightness — reduce back to 8 when done
    drawBacklight();
  };

  // ── Backlight ─────────────────────────────────────────────────────────────
  // A soft radial glow centred on the canvas — the ink floats against this
  // rather than against pure black. Drawn once at setup and also on resize.

  function drawBacklight() {
    let cx = p.width  / 2;
    let cy = p.height / 2;
    let r  = p.max(p.width, p.height) * 0.72;

    // Concentric ellipses fading inward to a slightly lighter centre —
    // most of the light is concentrated near the middle (quadratic falloff)
    for (let i = 0; i < 80; i++) {
      let pct = i / 80;               // 0 = edge, 1 = centre
      let br  = p.lerp(38, 72, pct * pct);
      let a   = p.lerp(0, 60, pct * pct);
      p.noStroke();
      p.fill(br, br, br + 2, a);      // faintest cool tint at centre
      let d = r * 2 * (1 - pct * 0.85);
      p.ellipse(cx, cy, d, d);
    }
  }

  // ── Draw ──────────────────────────────────────────────────────────────────
  // Each frame:
  // 1. Slowly fade the canvas toward the background — this dissolves old ink
  //    and creates smooth trailing forms rather than hard edges
  // 2. For each noise layer, sample the field and paint ink directly
  // 3. Advance time by a tiny amount

  p.draw = function() {

    // Fade toward background each frame — low alpha = long smooth trails
    // NOTE: bg value is bright (38) for testing — bring back to 8 when done
    p.noStroke();
    p.fill(38, 38, 40, 12);
    p.rect(0, 0, p.width, p.height);

    // Step size: pixels between noise samples
    // 4 = good balance of smoothness and performance
    let step = 4;

    // Draw each fluid layer directly onto the main canvas
    for (let li = 0; li < params.layers; li++) {

      // Each layer samples a offset region of the noise field
      // so they drift independently
      let layerOffset = li * 400;

      for (let x = 0; x < p.width; x += step) {
        for (let y = 0; y < p.height; y += step) {

          // 3D noise: x/y = position, t = slow time evolution
          let n = p.noise(
            x * params.noiseScale + layerOffset,
            y * params.noiseScale + layerOffset,
            t * params.timeScale + li * 0.3
          );

          // Only paint where noise exceeds threshold —
          // creates distinct shapes rather than a uniform wash
          let threshold = 0.42;
          let density = p.constrain((n - threshold) / (1 - threshold), 0, 1);

          if (density > 0) {
            // Ink is darker than the background — ink in water, not light
            // v goes from background brightness down toward black at full density
            let v = p.map(density, 0, 1, 38, 38 - params.inkStrength * 80);
            let rv = v + params.colorBias * 40;
            let bv = v - params.colorBias * 40;

            // Soft edges: opacity follows density
            let a = density * params.inkStrength * 255 * 0.6;

            p.noStroke();
            p.fill(rv, v, bv, a);
            p.rect(x, y, step, step);
          }
        }
      }
    }

    // Advance time — gentle continuous drift
    t += 0.08;
  };

  // ── Resize ────────────────────────────────────────────────────────────────

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    p.background(38);
    drawBacklight();
  };

});

// ─────────────────────────────────────────────────────────────────────────────
// AUDIO
// Starts automatically on load. Falls back silently if no files are configured.
// Web Audio API requires a user gesture on some browsers before playing —
// we attach a one-time click listener as a fallback.
// ─────────────────────────────────────────────────────────────────────────────

let audioCtx   = null;
let gainNode   = null;
let isMuted    = false;
let hasPlayed  = false;

async function startAudio() {
  if (hasPlayed || SOUND_FILES.length === 0) return;
  hasPlayed = true;

  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = audioCtx.createGain();
    gainNode.connect(audioCtx.destination);
    gainNode.gain.value = 1;

    // Pick a random file from the pool
    const url = SOUND_FILES[Math.floor(Math.random() * SOUND_FILES.length)];
    const res = await fetch(url);
    const buf = await res.arrayBuffer();
    const decoded = await audioCtx.decodeAudioData(buf);

    const source = audioCtx.createBufferSource();
    source.buffer  = decoded;
    source.loop    = true;
    source.connect(gainNode);
    source.start();

    // When this sound ends, pick a new random one
    source.onended = () => { hasPlayed = false; startAudio(); };

  } catch(e) {
    // No sound configured or blocked — fail silently
    console.info('Audio not available:', e.message);
  }
}

// Try autoplay immediately
startAudio();

// Fallback: first interaction triggers audio if autoplay was blocked
document.addEventListener('click', () => startAudio(), { once: true });
document.addEventListener('touchend', () => startAudio(), { once: true });

// ── Mute toggle ──────────────────────────────────────────────────────────────

const muteBtn   = document.getElementById('mute-btn');
const iconSound = document.getElementById('icon-sound');
const iconMute  = document.getElementById('icon-mute');

muteBtn.addEventListener('click', () => {
  isMuted = !isMuted;

  if (gainNode) {
    // Smooth fade rather than abrupt cut
    gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(
      isMuted ? 0 : 1,
      audioCtx.currentTime + 0.3
    );
  }

  iconSound.style.display = isMuted ? 'none'  : 'block';
  iconMute.style.display  = isMuted ? 'block' : 'none';
});
</script>

</body>
</html>
