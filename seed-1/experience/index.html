<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spore I — For the Trees</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Inconsolata:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #080808;
      --border: #1e1e1e;
      --text-dim: #3a3a3a;
      --text-mid: #777770;
      --text: #c8c8c0;
      --text-bright: #e8e8e0;
      --accent: #a8a890;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: var(--black);
      color: var(--text);
      font-family: 'Inconsolata', monospace;
      font-weight: 300;
      height: 100%;
      overflow: hidden;
      user-select: none;
    }

    /* Grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.5;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
    }

    /* UI layer */
    .ui {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px 36px;
      pointer-events: none;
    }

    .ui-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .ui-nav {
      pointer-events: all;
    }

    .ui-nav a {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.3s;
    }

    .ui-nav a:hover { color: var(--text); }

    .piece-id {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .ui-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Sound trigger */
    .sound-btn {
      pointer-events: all;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      background: none;
      border: none;
      color: inherit;
      font-family: inherit;
      transition: opacity 0.3s;
    }

    .sound-btn:hover { opacity: 0.7; }

    .sound-ring {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: border-color 0.4s;
    }

    .sound-ring.playing {
      border-color: var(--accent);
    }

    .sound-ring.playing .pulse {
      animation: pulse 2s ease-in-out infinite;
    }

    .pulse {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid var(--accent);
      opacity: 0;
    }

    @keyframes pulse {
      0%   { transform: scale(1);    opacity: 0.5; }
      100% { transform: scale(1.5);  opacity: 0; }
    }

    .sound-icon {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    .sound-bar {
      width: 2px;
      background: var(--text-mid);
      border-radius: 1px;
      transition: height 0.1s;
    }

    .b1 { height: 6px; }
    .b2 { height: 12px; }
    .b3 { height: 8px; }
    .b4 { height: 10px; }
    .b5 { height: 5px; }

    .sound-ring.playing .b1 { animation: bar 0.8s ease-in-out infinite alternate; }
    .sound-ring.playing .b2 { animation: bar 0.6s ease-in-out infinite alternate 0.1s; }
    .sound-ring.playing .b3 { animation: bar 1s ease-in-out infinite alternate 0.2s; }
    .sound-ring.playing .b4 { animation: bar 0.7s ease-in-out infinite alternate 0.05s; }
    .sound-ring.playing .b5 { animation: bar 0.9s ease-in-out infinite alternate 0.15s; }

    @keyframes bar {
      from { transform: scaleY(0.3); }
      to   { transform: scaleY(1.8); }
    }

    .sound-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .piece-title {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    /* Loading screen */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--black);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-text {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      animation: breathe 2s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 0.8; }
    }
  </style>
</head>
<body>

<div id="loading"><p class="loading-text">…</p></div>

<canvas id="c"></canvas>

<div class="ui">
  <div class="ui-top">
    <div class="ui-nav">
      <a href="../index.html">← For the Trees</a>
    </div>
    <div class="piece-id">001 / Spore I</div>
  </div>

  <div class="ui-bottom">
    <button class="sound-btn" id="soundBtn" aria-label="Play sound">
      <div class="sound-ring" id="soundRing">
        <div class="pulse"></div>
        <div class="sound-icon">
          <div class="sound-bar b1"></div>
          <div class="sound-bar b2"></div>
          <div class="sound-bar b3"></div>
          <div class="sound-bar b4"></div>
          <div class="sound-bar b5"></div>
        </div>
      </div>
      <span class="sound-label" id="soundLabel">Touch to hear</span>
    </button>
    <p class="piece-title">Vor lauter Bäumen</p>
  </div>
</div>

<script>
// ─── Physics simulation ───────────────────────────────────────────────────────
// Spore particles: each one is a small body with spring/drag forces.
// On hover/touch, a repulsion field pushes them away.
// They naturally settle back into a loose orbiting cluster.

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W, H, cx, cy, mouse = { x: -9999, y: -9999, active: false };
let bodies = [];
let time = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}

// ── Body class ──────────────────────────────────────────────────────────────
class Body {
  constructor() {
    const angle  = Math.random() * Math.PI * 2;
    const radius = 60 + Math.random() * 120;
    this.ox = cx + Math.cos(angle) * radius; // orbit origin
    this.oy = cy + Math.sin(angle) * radius;
    this.x  = this.ox;
    this.y  = this.oy;
    this.vx = 0;
    this.vy = 0;
    this.r  = Math.random() * 1.4 + 0.4;
    this.alpha = Math.random() * 0.5 + 0.15;
    this.orbitSpeed = (Math.random() - 0.5) * 0.0006;
    this.orbitAngle = angle;
    this.orbitR     = radius;
    this.phase      = Math.random() * Math.PI * 2;
    this.breatheAmp = Math.random() * 4 + 1;
    this.breatheSpd = Math.random() * 0.008 + 0.004;
  }

  update() {
    // Slowly drift orbit origin
    this.orbitAngle += this.orbitSpeed;
    const breathe = Math.sin(time * this.breatheSpd + this.phase) * this.breatheAmp;
    this.ox = cx + Math.cos(this.orbitAngle) * (this.orbitR + breathe);
    this.oy = cy + Math.sin(this.orbitAngle) * (this.orbitR + breathe);

    // Spring toward orbit origin
    const kSpring = 0.018;
    const dx = this.ox - this.x;
    const dy = this.oy - this.y;
    this.vx += dx * kSpring;
    this.vy += dy * kSpring;

    // Repulsion from mouse/touch
    if (mouse.active) {
      const mx = mouse.x - this.x;
      const my = mouse.y - this.y;
      const dist = Math.sqrt(mx * mx + my * my);
      const repelRadius = 140;
      if (dist < repelRadius && dist > 0) {
        const force = (1 - dist / repelRadius) * 3.5;
        this.vx -= (mx / dist) * force;
        this.vy -= (my / dist) * force;
      }
    }

    // Drag
    this.vx *= 0.88;
    this.vy *= 0.88;

    this.x += this.vx;
    this.y += this.vy;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(168, 168, 144, ${this.alpha})`;
    ctx.fill();
  }
}

// ── Central glow ────────────────────────────────────────────────────────────
function drawCore() {
  const pulse = Math.sin(time * 0.012) * 0.04 + 0.12;
  const grad  = ctx.createRadialGradient(cx, cy, 0, cx, cy, 180);
  grad.addColorStop(0,   `rgba(168, 168, 120, ${pulse})`);
  grad.addColorStop(0.4, `rgba(100, 100, 80,  ${pulse * 0.4})`);
  grad.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, 180, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // tiny center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 1.5, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(168, 168, 144, 0.4)`;
  ctx.fill();
}

// ── Connection lines (very faint) ───────────────────────────────────────────
function drawConnections() {
  const threshold = 80;
  for (let i = 0; i < bodies.length; i++) {
    const a = bodies[i];
    const da = Math.hypot(a.x - cx, a.y - cy);
    if (da < threshold * 1.5) {
      const alpha = (1 - da / (threshold * 2)) * 0.06;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(a.x, a.y);
      ctx.strokeStyle = `rgba(168,168,144,${alpha})`;
      ctx.lineWidth   = 0.4;
      ctx.stroke();
    }
    for (let j = i + 1; j < bodies.length; j++) {
      const b = bodies[j];
      const d = Math.hypot(a.x - b.x, a.y - b.y);
      if (d < threshold) {
        const alpha = (1 - d / threshold) * 0.04;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = `rgba(168,168,144,${alpha})`;
        ctx.lineWidth   = 0.3;
        ctx.stroke();
      }
    }
  }
}

function loop() {
  time++;
  ctx.clearRect(0, 0, W, H);
  drawCore();
  drawConnections();
  bodies.forEach(b => { b.update(); b.draw(); });
  requestAnimationFrame(loop);
}

function init() {
  resize();
  bodies = Array.from({ length: 90 }, () => new Body());
  loop();
  // hide loading
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
  }, 600);
}

window.addEventListener('resize', () => {
  resize();
  bodies.forEach(b => {
    const angle = Math.random() * Math.PI * 2;
    b.orbitAngle = angle;
    b.ox = cx + Math.cos(angle) * b.orbitR;
    b.oy = cy + Math.sin(angle) * b.orbitR;
  });
});

// ── Input ────────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true;
});
canvas.addEventListener('mouseleave', () => { mouse.active = false; });
canvas.addEventListener('touchmove',  e => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
  mouse.active = true;
}, { passive: false });
canvas.addEventListener('touchend', () => { mouse.active = false; });

// ─── Audio ────────────────────────────────────────────────────────────────────
// Placeholder: swap these URLs for your actual hosted sound files
// or replace the fetch with an API call to ElevenLabs / AudioGen
const SOUNDS = [
  'sounds/forest-1.mp3',
  'sounds/forest-2.mp3',
  'sounds/forest-3.mp3',
];

let audioCtx = null;
let currentSource = null;
let isPlaying = false;

const btn   = document.getElementById('soundBtn');
const ring  = document.getElementById('soundRing');
const label = document.getElementById('soundLabel');

async function playRandomSound() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  if (isPlaying && currentSource) {
    currentSource.stop();
    isPlaying = false;
    ring.classList.remove('playing');
    label.textContent = 'Touch to hear';
    return;
  }

  label.textContent = '…';
  const url = SOUNDS[Math.floor(Math.random() * SOUNDS.length)];

  try {
    const res    = await fetch(url);
    const buffer = await res.arrayBuffer();
    const decoded = await audioCtx.decodeAudioData(buffer);

    currentSource = audioCtx.createBufferSource();
    currentSource.buffer = decoded;
    currentSource.connect(audioCtx.destination);
    currentSource.start();
    isPlaying = true;
    ring.classList.add('playing');
    label.textContent = 'Playing';

    currentSource.onended = () => {
      isPlaying = false;
      ring.classList.remove('playing');
      label.textContent = 'Touch to hear';
    };
  } catch(e) {
    // No sound files yet — still show the animation
    console.warn('Sound not available:', e);
    label.textContent = 'Touch to hear';
    // Simulate playing state for demo purposes
    ring.classList.add('playing');
    label.textContent = 'Playing';
    setTimeout(() => {
      ring.classList.remove('playing');
      label.textContent = 'Touch to hear';
    }, 4000);
  }
}

btn.addEventListener('click', playRandomSound);

init();
</script>
</body>
</html>
